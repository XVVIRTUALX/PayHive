<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <h1 class="logo">Gold Hive</h1>
    <nav>
        <a href="index.html">Home</a>
        <a href="payment.html">Pay Worker</a>
        <a href="buy-products.html">Buy Products</a>
    </nav>
</header>

<main class="hero">
    <h2>Buy Products</h2>

    <!-- Pending Payment Message -->
    <p id="pending-msg" style="color: #555; font-weight:bold;">
        Payment pending — waiting for Hnry confirmation.
    </p>
    <!-- ▲ This will show until you replace the placeholders with Hnry info -->

    <!-- HNRY Payment Link Button -->
    <a class="btn" href="HNRY_PRODUCT_LINK_GOES_HERE" target="_blank" id="hnry-link">
        Pay via Hnry Link
    </a>
    <!-- ▲ Replace HNRY_PRODUCT_LINK_GOES_HERE with your actual Hnry product link -->

    <p>Or scan QR code:</p>
    <!-- HNRY QR Code -->
    <img src="HNRY_PRODUCT_QR.png" alt="Scan to Pay" width="200" id="hnry-qr">
    <!-- ▲ Replace HNRY_PRODUCT_QR.png with the actual QR code file from Hnry -->

    <button id="copy-link-btn" class="btn">Copy Payment Link</button>

</main>

<footer>
    <p>&copy; 2026 PayHive / Virtual Online Contact Centre</p>
</footer>

<script src="js/main.js"></script>
